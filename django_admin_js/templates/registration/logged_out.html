{% load i18n static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% translate 'Logged out' %} | Django Admin</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          },
          colors: {
            apple: {
              blue: '#6366f1',
              'blue-hover': '#4f46e5',
              bg: '#f8fafc',
              darkbg: '#090d16',
              text: '#0f172a',
              darktext: '#f8fafc',
              secondary: '#64748b'
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .floating-card {
      animation: float 5s ease-in-out infinite;
    }
  </style>
</head>
<body class="h-full bg-apple-bg dark:bg-apple-darkbg text-apple-text dark:text-apple-darktext font-sans antialiased flex items-center justify-center relative overflow-hidden p-4">
  
  <!-- Aurora Background Effects -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-[30%] -left-[20%] w-[70%] h-[70%] rounded-full bg-indigo-500/10 blur-[120px] dark:bg-indigo-500/5"></div>
    <div class="absolute -bottom-[30%] -right-[20%] w-[70%] h-[70%] rounded-full bg-emerald-500/10 blur-[120px] dark:bg-emerald-500/5"></div>
  </div>

  <!-- Main Content Card -->
  <div class="relative z-10 w-full max-w-md bg-white/70 dark:bg-zinc-900/70 border border-slate-200/50 dark:border-zinc-800/50 backdrop-blur-xl shadow-2xl rounded-3xl p-10 text-center space-y-8 floating-card transition-all duration-300">
    
    <div class="space-y-4">
      <!-- Animated Checkmark Icon -->
      <div class="mx-auto w-16 h-16 bg-emerald-500/10 dark:bg-emerald-500/20 text-emerald-500 dark:text-emerald-400 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/5">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      
      <div class="space-y-2">
        <h2 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-apple-text to-slate-500 dark:from-apple-darktext dark:to-slate-400 bg-clip-text text-transparent">
          {% translate 'Safe & Sound' %}
        </h2>
        <p class="text-base text-apple-secondary font-medium">
          {% translate 'You have been successfully logged out.' %}
        </p>
      </div>
    </div>

    <!-- Info message block -->
    <div class="p-4 bg-slate-50/50 dark:bg-zinc-900/50 border border-slate-100 dark:border-zinc-800/80 rounded-2xl text-sm text-apple-secondary dark:text-slate-400 font-medium">
      {% translate 'Thank you for using our administration interface. Have a wonderful day!' %}
    </div>

    <!-- Login Link Button -->
    <div class="pt-2">
      <a href="{% url 'admin:index' %}" class="inline-flex items-center justify-center gap-2 w-full py-3.5 px-6 bg-apple-blue hover:bg-apple-blue-hover text-white rounded-2xl text-sm font-semibold shadow-lg shadow-apple-blue/20 hover:shadow-apple-blue/30 transition-all duration-200 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        <span>{% translate 'Log in again' %}</span>
      </a>
    </div>
    
  </div>

</body>
</html>
