{% load i18n %}
<nav aria-label="{% translate 'Breadcrumbs' %}" class="w-full mb-4 px-6 py-3 bg-slate-100/80 dark:bg-zinc-900/80 border border-slate-300/80 dark:border-zinc-800/80 rounded-2xl shadow-sm">
  {% block breadcrumbs %}
    <div class="breadcrumbs flex items-center gap-2 text-xs font-semibold text-apple-secondary">
      <a href="{% url 'admin:index' %}" class="text-zinc-600 dark:text-zinc-300 hover:text-apple-blue transition-colors">{% translate 'Home' %}</a>
      {% if title %}
        <span class="text-slate-300 dark:text-zinc-700">/</span>
        <span class="text-zinc-800 dark:text-zinc-150">{{ title }}</span>
      {% endif %}
    </div>
  {% endblock %}
</nav>
