name: test

# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["5.0", "5.1", "5.2a0"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django~=${{ matrix.django-version }}"
          pip install -e .
      - name: Run tests
        run: |
          # Since this is a template-heavy app, we just check if it imports correctly
          # and runs standard Django checks.
          django-admin check --settings=django_admin_js.tests_settings
        env:
          PYTHONPATH: .
