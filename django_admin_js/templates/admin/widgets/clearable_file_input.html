{% if widget.is_initial %}
<div class="file-upload flex flex-col sm:flex-row sm:items-center gap-3 p-3 bg-slate-50 dark:bg-zinc-800/40 border border-slate-200/60 dark:border-zinc-700/60 rounded-xl text-sm mb-2">
  <div class="flex items-center gap-2 min-w-0">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-indigo-500 shrink-0">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m6.75 12-3-3m0 0-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
    </svg>
    <div class="flex flex-col min-w-0">
      <span class="text-xs font-semibold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">{{ widget.initial_text }}</span>
      <a href="{{ widget.value.url }}" target="_blank" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:underline truncate">{{ widget.value }}</a>
    </div>
  </div>
  
  {% if not widget.required %}
  <div class="sm:ml-auto flex items-center gap-2 shrink-0 bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-700/80 px-3 py-1.5 rounded-lg shadow-sm">
    <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}" class="w-4 h-4 rounded text-red-600 focus:ring-red-500 border-slate-300 dark:border-zinc-700 bg-white dark:bg-zinc-800" {% if widget.attrs.disabled %} disabled{% endif %}{% if widget.attrs.checked %} checked{% endif %}>
    <label for="{{ widget.checkbox_id }}" class="text-xs font-bold text-red-600 dark:text-red-400 select-none cursor-pointer">{{ widget.clear_checkbox_label }}</label>
  </div>
  {% endif %}
</div>
<div class="text-xs font-semibold text-slate-400 dark:text-zinc-500 uppercase tracking-wider mb-1.5 mt-2">{{ widget.input_text }}:</div>
{% endif %}
<input type="{{ widget.type }}" name="{{ widget.name }}" class="block w-full text-sm text-slate-500 dark:text-zinc-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 dark:file:bg-indigo-950/40 file:text-indigo-600 dark:file:text-indigo-400 hover:file:bg-indigo-100 dark:hover:file:bg-indigo-950/60 file:cursor-pointer cursor-pointer border border-slate-200 dark:border-zinc-800 rounded-xl bg-white/50 dark:bg-black/20 p-1" {% include "django/forms/widgets/attrs.html" %}>
