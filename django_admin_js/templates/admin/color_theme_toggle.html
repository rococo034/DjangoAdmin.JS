{% load i18n %}
<button class="theme-toggle p-2 rounded-xl hover:bg-white/80 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 transition-all duration-150 flex items-center justify-center cursor-pointer" style="background: transparent; border: none; outline: none; box-shadow: none;">
  <div class="visually-hidden theme-label-when-auto">{% translate 'Toggle theme (current theme: auto)' %}</div>
  <div class="visually-hidden theme-label-when-light">{% translate 'Toggle theme (current theme: light)' %}</div>
  <div class="visually-hidden theme-label-when-dark">{% translate 'Toggle theme (current theme: dark)' %}</div>
  <svg aria-hidden="true" class="theme-icon-when-auto w-4.5 h-4.5">
    <use xlink:href="#icon-auto" />
  </svg>
  <svg aria-hidden="true" class="theme-icon-when-dark w-4.5 h-4.5">
    <use xlink:href="#icon-moon" />
  </svg>
  <svg aria-hidden="true" class="theme-icon-when-light w-4.5 h-4.5">
    <use xlink:href="#icon-sun" />
  </svg>
</button>
